<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1a">
<title>Sic Bo Live Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0b0f1a; --surface:#141929; --card:#1a2035; --border:#252d45;
    --accent:#f5c842; --red:#e84545; --blue:#3498db; --green:#2ecc71;
    --purple:#9b59b6; --text:#dde4f0; --muted:#5a6480;
    --mono:'Share Tech Mono',monospace; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-text{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.05em;}
  .pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);transition:all .3s;}
  .pill.live{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.08);}
  .pill.scanning{border-color:var(--accent);color:var(--accent);background:rgba(245,200,66,.08);}
  .pill.error{border-color:var(--red);color:var(--red);}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .pill.live .dot{animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  .controls{padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border);background:var(--surface);}
  .btn{flex:1;padding:10px 8px;border:none;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
  .btn-start{background:var(--accent);color:#0b0f1a;}
  .btn-start:hover:not(:disabled){filter:brightness(1.1);}
  .btn-start:disabled{opacity:.4;cursor:not-allowed;}
  .btn-stop{background:var(--red);color:#fff;}
  .btn-sm{flex:0 0 auto;padding:10px 14px;background:var(--card);color:var(--muted);border:1px solid var(--border);}
  .btn-sm:hover{border-color:var(--muted);color:var(--text);}

  .backend-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .backend-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;}
  .backend-input:focus{border-color:var(--accent);}
  .backend-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  .stat{background:var(--surface);padding:10px 8px;text-align:center;}
  .stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
  .stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

  .table-head{display:grid;grid-template-columns:36px 54px 1fr 76px 64px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:50;}
  .th{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

  .data-list{flex:1;overflow-y:auto;}
  .row{display:grid;grid-template-columns:36px 54px 1fr 76px 64px;padding:9px 16px;border-bottom:1px solid rgba(37,45,69,.5);align-items:center;animation:rowIn .25s ease;}
  @keyframes rowIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
  .row:nth-child(even){background:rgba(26,32,53,.4);}
  .rn{font-family:var(--mono);font-size:10px;color:var(--muted);}
  .rtotal{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--text);}
  .rchips{font-family:var(--mono);font-size:11px;color:var(--accent);}
  .badge{padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;}
  .BIG{background:rgba(232,69,69,.18);color:var(--red);}
  .SMALL{background:rgba(52,152,219,.18);color:var(--blue);}
  .ODD{background:rgba(155,89,182,.18);color:var(--purple);}
  .EVEN{background:rgba(46,204,113,.18);color:var(--green);}
  .TRIPLE{background:rgba(245,200,66,.18);color:var(--accent);}
  .rtime{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:10px;}
  .empty-icon{font-size:44px;opacity:.25;}
  .empty-title{font-family:var(--mono);font-size:13px;color:var(--muted);}
  .empty-sub{font-size:11px;color:var(--muted);opacity:.6;line-height:1.7;max-width:240px;}

  .logbar{padding:7px 16px;background:var(--surface);border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);min-height:32px;display:flex;align-items:center;gap:6px;position:sticky;bottom:0;}
  .logbar.ok{color:var(--green);}
  .logbar.err{color:var(--red);}

  .fab{position:fixed;bottom:44px;right:14px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#0b0f1a;border:none;font-size:17px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(245,200,66,.4);z-index:200;}
  .fab.show{display:flex;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span style="font-size:18px">🎲</span>
    <span class="logo-text">SIC BO // LIVE</span>
  </div>
  <div class="pill" id="pill"><div class="dot"></div><span id="pill-txt">IDLE</span></div>
</div>

<!-- Backend URL input -->
<div class="backend-row">
  <span class="backend-label">API:</span>
  <input class="backend-input" id="backend-url" placeholder="https://your-app.railway.app" value="">
  <button class="btn btn-sm" onclick="saveUrl()" style="font-size:11px;padding:7px 10px;">SAVE</button>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-start" id="btn-start" onclick="startScan()">▶ START</button>
  <button class="btn btn-stop" id="btn-stop" onclick="stopScan()" style="display:none">■ STOP</button>
  <button class="btn btn-sm" onclick="clearData()" title="Clear">🗑</button>
  <button class="btn btn-sm" onclick="exportCSV()" title="Export CSV">⬇</button>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Rounds</div></div>
  <div class="stat"><div class="stat-val" id="s-big" style="color:var(--red)">0</div><div class="stat-lbl">Big</div></div>
  <div class="stat"><div class="stat-val" id="s-small" style="color:var(--blue)">0</div><div class="stat-lbl">Small</div></div>
  <div class="stat"><div class="stat-val" id="s-triple" style="color:var(--accent)">0</div><div class="stat-lbl">Triple</div></div>
</div>

<!-- Table -->
<div class="table-head">
  <span class="th">#</span>
  <span class="th">Total</span>
  <span class="th">Chips</span>
  <span class="th">Result</span>
  <span class="th" style="text-align:right">Time</span>
</div>

<div class="data-list" id="data-list">
  <div class="empty" id="empty">
    <div class="empty-icon">🎲</div>
    <div class="empty-title">No data yet</div>
    <div class="empty-sub">Railway URL paste කරලා START click කරන්න. Backend eka 1xBet login කරලා auto scan කරනවා.</div>
  </div>
</div>

<div class="logbar" id="logbar">— <span id="log-txt">Ready</span></div>
<button class="fab" id="fab" onclick="exportCSV()">⬇</button>

<script>
let pollId = null;
let rounds = [];

const API = () => localStorage.getItem('sicbo_backend') || '';

// Load saved URL
window.onload = () => {
  const saved = localStorage.getItem('sicbo_backend');
  if (saved) document.getElementById('backend-url').value = saved;
  pollStatus();
};

function saveUrl() {
  const url = document.getElementById('backend-url').value.trim().replace(/\/$/, '');
  localStorage.setItem('sicbo_backend', url);
  log('Backend URL saved: ' + url, '');
}

async function startScan() {
  const url = API();
  if (!url) { log('Railway URL enter කරන්න!', 'err'); return; }
  try {
    const r = await fetch(url + '/api/start', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      setPill('scanning', 'STARTING');
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'flex';
      log('Scan started — logging in to 1xBet...', 'ok');
      startPolling();
    } else {
      log('Error: ' + d.msg, 'err');
    }
  } catch(e) { log('Cannot reach backend: ' + e.message, 'err'); }
}

async function stopScan() {
  const url = API();
  try {
    await fetch(url + '/api/stop', { method: 'POST' });
  } catch(e) {}
  stopPolling();
  setPill('', 'IDLE');
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
  log('Stopped.', '');
}

function startPolling() {
  if (pollId) clearInterval(pollId);
  fetchData();
  pollId = setInterval(fetchData, 5000); // poll every 5s
}

function stopPolling() {
  if (pollId) clearInterval(pollId);
  pollId = null;
}

async function pollStatus() {
  const url = API();
  if (!url) return;
  try {
    const r = await fetch(url + '/api/status');
    const d = await r.json();
    updatePillFromStatus(d.status);
    if (d.scanning) {
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'flex';
      if (!pollId) startPolling();
    }
  } catch(e) {}
}

async function fetchData() {
  const url = API();
  if (!url) return;
  try {
    // Fetch status
    const sr = await fetch(url + '/api/status');
    const status = await sr.json();
    updatePillFromStatus(status.status);
    if (status.error) log('Backend error: ' + status.error, 'err');
    if (status.last_scan) log('Last scan: ' + new Date(status.last_scan).toLocaleTimeString(), 'ok');

    // Fetch rounds
    const rr = await fetch(url + '/api/rounds?limit=200');
    const data = await rr.json();
    if (data.rounds) {
      rounds = data.rounds;
      renderTable();
      updateStats();
    }
  } catch(e) {
    log('Fetch error: ' + e.message, 'err');
  }
}

function updatePillFromStatus(s) {
  const map = {
    'idle': ['', 'IDLE'],
    'starting': ['scanning', 'STARTING'],
    'logging_in': ['scanning', 'LOGIN...'],
    'scanning': ['live', 'LIVE'],
    'error': ['error', 'ERROR']
  };
  const [cls, txt] = map[s] || ['', s.toUpperCase()];
  setPill(cls, txt);
}

function renderTable() {
  const list = document.getElementById('data-list');
  if (!rounds.length) {
    list.innerHTML = '<div class="empty" id="empty"><div class="empty-icon">🎲</div><div class="empty-title">Scanning...</div><div class="empty-sub">Waiting for first Sic Bo round result...</div></div>';
    return;
  }
  list.innerHTML = rounds.map((r, i) => `
    <div class="row">
      <span class="rn">${r.id}</span>
      <span class="rtotal">${r.dice_total ?? '—'}</span>
      <span class="rchips">${r.chips || '—'}</span>
      <span><span class="badge ${r.big_small || ''}">${r.big_small || '—'}</span></span>
      <span class="rtime">${r.time}</span>
    </div>
  `).join('');
  document.getElementById('fab').classList.add('show');
}

function updateStats() {
  document.getElementById('s-total').textContent = rounds.length;
  document.getElementById('s-big').textContent = rounds.filter(r=>r.big_small==='BIG').length;
  document.getElementById('s-small').textContent = rounds.filter(r=>r.big_small==='SMALL').length;
  document.getElementById('s-triple').textContent = rounds.filter(r=>r.big_small==='TRIPLE').length;
}

async function clearData() {
  if (!confirm('Data clear කරන්නද?')) return;
  try { await fetch(API() + '/api/rounds/clear', {method:'POST'}); } catch(e) {}
  rounds = [];
  renderTable();
  updateStats();
}

function exportCSV() {
  const url = API();
  if (url) { window.open(url + '/api/export/csv'); return; }
  // fallback local
  const lines = ['Round,Dice Total,Big/Small,Chips,Time'];
  rounds.forEach(r => lines.push(`${r.id},${r.dice_total},${r.big_small},${r.chips||''},${r.time}`));
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sicbo.csv';
  a.click();
}

function setPill(cls, txt) {
  const p = document.getElementById('pill');
  p.className = 'pill' + (cls ? ' '+cls : '');
  document.getElementById('pill-txt').textContent = txt;
}

function log(msg, cls) {
  const lb = document.getElementById('logbar');
  lb.className = 'logbar' + (cls ? ' '+cls : '');
  document.getElementById('log-txt').textContent = msg;
}
</script>
</body>
</html>
